name: Build S-Studio (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          npm i
        env:
          VSCODE_SKIP_NODE_VERSION_CHECK: '1'
          
      - name: Build Windows Archive
        run: |
          npm run gulp vscode-win32-x64-archive
        env:
          NODE_ENV: production
          
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: S-Studio-Windows-x64
          path: ../VSCode-win32-x64
